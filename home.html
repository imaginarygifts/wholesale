<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="css/topbar.css">
<link rel="stylesheet" href="css/home-sections.css">

<style>
  body { margin: 0; background: #0A0A0C; }
</style>
</head>
<body>

  <!-- ===================== TOP BAR ===================== -->
  <header class="ig-topbar">
    <div class="ig-topbar-left">
      <button id="ig-menu-btn" class="ig-icon-btn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

      <a href="index.html" class="ig-brand">
        <span class="ig-brand-icon">🎁</span>
        <span class="ig-brand-name">Imaginary Gifts</span>
      </a>
    </div>
    <div class="ig-topbar-right">
      <button class="ig-icon-btn" aria-label="Search">

    <div class="ig-nav-drawer-backdrop"></div>
    <nav class="ig-nav-drawer-panel">
      <button id="ig-drawer-close" class="ig-nav-drawer-close" aria-label="Close menu">✕</button>
      <a href="index.html">Home</a>
      <a href="aboutus.html">About Us</a>
      <a href="contact-us.html">Contact Us</a>
    </nav>
  </div>

  <!-- ===================== BUILDER-MANAGED CONTENT ===================== -->
  <main id="ig-home-sections"></main>

  <footer class="ig-footer">
    <p>© <span id="ig-year"></span> Imaginary Gifts. All rights reserved. ·

    </p>

  <script>document.getElementById("ig-year").textContent = new Date().getFullYear();</script>
  <script src="js/topbar.js"></script>
  <script type="module" src="js/home-sections-public.js"></script>
